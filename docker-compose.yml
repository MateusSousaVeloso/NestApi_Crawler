name: milhas

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m

  nestjs:
    build: .
    ports:
      - "3000:3000"
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
    env_file:
      - ./.env
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ../Front-Milhas
      args:
        VITE_APP_BACKEND_URL: http://localhost:3000
    ports:
      - "5173:80"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    depends_on:
      - nestjs
